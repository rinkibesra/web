<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form action="/server">
        <h1>Feedback Form</h1>
        <div><label for="name">Name:</label>
        <input type="text" placeholder="Write you name" id="name" name="name"></div><br>
        <div>
            <label for="email">Email:</label>
        <input type="email" placeholder="Write your email" id="email" name="email">
        </div><br>
        <div><label for="feedback">Message:</label><br>
            <textarea id="feedback" name="feedback" placeholder=""></textarea>
        </div>
        <br>
        <div><label>Rate us out of 5:</label><br>
            <input type="radio" name="rate" id="1" value="1">
            <label for="1">1</label><br>
             <input type="radio" name="rate" id="2" value="2">
            <label for="2">2</label><br>
             <input type="radio" name="rate" id="3" value="3">
            <label for="3">3</label><br>
             <input type="radio" name="rate" id="4" value="4">
            <label for="4">4</label><br>
             <input type="radio" name="rate" id="5" value="5">
            <label for="5">5</label><br>

        </div>
        <br>
        <div>
            <button type="submit">Send your message!</button>
        </div>

    </form>
</body>
</html>
