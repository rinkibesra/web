<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            background-color: aqua;
            text-align: center;
            border: 2px solid black;
        }
        .one{
            background-color: antiquewhite;
            position: relative;
            top:100px;
            left: 200px;
            z-index: 4;
        }
        .two{
            background-color: blue;
            position: relative;
            top:50px;
            left: 150px;
            z-index: 3;
            
            
       

        }
        .three{
            background-color: cadetblue;
            position: relative;
            left: 100px;
            z-index: 2;
        }
        .four{
            left:50px;
            bottom: 50px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="box one">1</div>
    <div class="box two">2</div>
    <div class="box three">3</div>
    <div class="box four">4</div>
</body>

</html>
